<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect x="0" y="0" width="400" height="300" fill="#ffffff"/>
  <g fill="none" stroke="#111827" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- 증류탑(컬럼) -->
    <rect x="64" y="40" width="44" height="205" rx="8"/>
    <line x1="64" y1="90" x2="108" y2="90"/>
    <line x1="64" y1="130" x2="108" y2="130"/>
    <line x1="64" y1="170" x2="108" y2="170"/>
    <line x1="64" y1="210" x2="108" y2="210"/>
    <text x="86" y="270" font-size="12" fill="#374151" stroke="none" text-anchor="middle">컬럼</text>

    <!-- 원료(feed) -->
    <line x1="20" y1="145" x2="64" y2="145"/>
    <polygon points="40,139 40,151 52,145" fill="#111827" stroke="none"/>

    <!-- 탑정 증기 → 응축기 -->
    <line x1="86" y1="40" x2="86" y2="24"/>
    <line x1="86" y1="24" x2="180" y2="24"/>
    <!-- 응축기(열교환기) -->
    <rect x="180" y="12" width="58" height="30"/>
    <path d="M180,27 Q195,12 209,27 T238,27"/>
    <!-- 응축액 → 환류 드럼 -->
    <line x1="209" y1="42" x2="209" y2="66"/>
    <rect x="182" y="66" width="54" height="30" rx="15"/>

    <!-- 환류 펌프 -->
    <line x1="209" y1="96" x2="209" y2="120"/>
    <circle cx="209" cy="134" r="14"/>
    <!-- 환류 복귀 + 제품 -->
    <line x1="195" y1="134" x2="120" y2="134"/>
    <line x1="120" y1="134" x2="120" y2="90"/>
    <line x1="223" y1="134" x2="300" y2="134"/>
    <polygon points="270,128 270,140 282,134" fill="#111827" stroke="none"/>

    <!-- 탑저 제품 -->
    <line x1="86" y1="245" x2="86" y2="262"/>
    <line x1="86" y1="262" x2="300" y2="262"/>
    <polygon points="270,256 270,268 282,262" fill="#111827" stroke="none"/>
  </g>
</svg>
