<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect x="0" y="0" width="400" height="300" fill="#ffffff"/>
  <g fill="none" stroke="#111827" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- 세면기 -->
    <ellipse cx="100" cy="55" rx="46" ry="15"/>
    <!-- 급수전(수도꼭지) @ (95,30) -->
    <line x1="85" y1="26" x2="85" y2="44"/>
    <line x1="85" y1="26" x2="110" y2="26"/>
    <line x1="110" y1="26" x2="110" y2="40"/>
    <line x1="75" y1="21" x2="95" y2="21"/>
    <line x1="85" y1="26" x2="85" y2="21"/>

    <!-- 배수 + P 트랩 @ (~120,150) -->
    <line x1="100" y1="70" x2="100" y2="150"/>
    <path d="M100,150 A16,16 0 0 0 132,150 L132,118 A12,12 0 0 1 156,118 L156,255"/>

    <!-- 배수 본관 -->
    <line x1="40" y1="255" x2="380" y2="255"/>
    <text x="40" y="278" font-size="14" fill="#374151" stroke="none">배수 본관</text>
    <!-- 유체 흐름 화살표 (배수: 아래로, 본관: 오른쪽으로) -->
    <polygon points="94,110 106,110 100,122" fill="#111827" stroke="none"/>
    <polygon points="318,249 318,261 330,255" fill="#111827" stroke="none"/>

    <!-- 티 분기점 -->
    <circle cx="156" cy="255" r="3.5" fill="#111827"/>

    <!-- 바닥 배수구(FD) @ (258,218) -->
    <rect x="240" y="200" width="36" height="36"/>
    <line x1="240" y1="200" x2="276" y2="236"/>
    <line x1="276" y1="200" x2="240" y2="236"/>
    <line x1="258" y1="236" x2="258" y2="255"/>
    <circle cx="258" cy="255" r="3.5" fill="#111827"/>
  </g>
</svg>
