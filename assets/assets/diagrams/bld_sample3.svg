<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect x="0" y="0" width="400" height="300" fill="#ffffff"/>
  <g fill="none" stroke="#111827" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- 저수조 -->
    <rect x="26" y="178" width="70" height="60"/>
    <line x1="26" y1="196" x2="96" y2="196" stroke-dasharray="6 4" stroke-width="2"/>
    <text x="30" y="258" font-size="13" fill="#374151" stroke="none">저수조</text>

    <!-- 급수 서비스관 -->
    <line x1="96" y1="210" x2="270" y2="210"/>
    <polygon points="234,204 234,216 246,210" fill="#111827" stroke="none"/>
    <polygon points="276,150 264,150 270,138" fill="#111827" stroke="none"/>

    <!-- 게이트 밸브 @ (125,210) -->
    <polygon points="115,202 115,218 125,210"/>
    <polygon points="135,202 135,218 125,210"/>

    <!-- 펌프 @ (170,210) -->
    <circle cx="170" cy="210" r="14"/>
    <line x1="170" y1="196" x2="160" y2="188"/>
    <line x1="170" y1="196" x2="180" y2="188"/>

    <!-- 체크 밸브 @ (220,210) -->
    <polygon points="210,201 210,219 226,210" fill="#111827"/>
    <line x1="228" y1="200" x2="228" y2="220"/>

    <!-- 입상관(riser) -->
    <line x1="270" y1="210" x2="270" y2="52"/>

    <!-- 감압 밸브 @ (270,120) -->
    <polygon points="256,110 256,130 270,120"/>
    <polygon points="284,110 284,130 270,120"/>
    <line x1="270" y1="120" x2="270" y2="104"/>
    <rect x="258" y="96" width="24" height="8"/>

    <!-- 압력계 @ (310,165) -->
    <line x1="270" y1="165" x2="296" y2="165"/>
    <circle cx="310" cy="165" r="14"/>
    <line x1="310" y1="165" x2="320" y2="157"/>

    <!-- 상층 급수 -->
    <line x1="270" y1="55" x2="360" y2="55"/>
    <text x="300" y="45" font-size="13" fill="#374151" stroke="none">상층 급수</text>
  </g>
</svg>
