    <!-- 급기 덕트 -->
    <line x1="110" y1="150" x2="360" y2="150"/>
    <polygon points="170,144 170,156 182,150" fill="#111827" stroke="none"/>
    <polygon points="280,144 280,156 292,150" fill="#111827" stroke="none"/>

    <!-- VAV 박스 -->
    <rect x="205" y="137" width="50" height="26"/>
    <line x1="217" y1="161" x2="231" y2="139"/>
    <rect x="257" y="143" width="12" height="12"/>

    <!-- 급기 디퓨저 -->
    <line x1="310" y1="150" x2="310" y2="184"/>
    <rect x="292" y="184" width="36" height="36"/>
    <line x1="292" y1="184" x2="328" y2="220"/>
    <line x1="328" y1="184" x2="292" y2="220"/>

    <!-- 온도 조절기 + 제어 신호 -->
    <rect x="322" y="70" width="28" height="38" rx="4"/>
    <circle cx="336" cy="87" r="8"/>
    <line x1="336" y1="87" x2="342" y2="81"/>
    <polyline points="322,90 300,90 300,137" stroke-dasharray="4 4" stroke-width="2"/>
