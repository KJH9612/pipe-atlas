    <!-- 공조기(AHU) -->
    <rect x="16" y="120" width="94" height="56"/>
    <line x1="46" y1="120" x2="46" y2="176"/>
    <line x1="78" y1="120" x2="78" y2="176"/>
    <polyline points="22,130 40,130 22,142 40,142 22,154 40,154"/>
    <line x1="54" y1="126" x2="70" y2="170" stroke-width="2"/>
    <circle cx="94" cy="148" r="9"/>
    <text x="63" y="192" font-size="11" fill="#374151" stroke="none" text-anchor="middle">AHU</text>

    <!-- 냉수 코일 + 전동 2방 밸브 -->
    <line x1="60" y1="176" x2="60" y2="220"/>
