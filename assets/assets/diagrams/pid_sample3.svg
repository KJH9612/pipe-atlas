<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect x="0" y="0" width="400" height="300" fill="#ffffff"/>
  <g fill="none" stroke="#111827" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- 공정(피가열) 라인 -->
    <line x1="30" y1="150" x2="360" y2="150"/>
    <polygon points="118,144 118,156 130,150" fill="#111827" stroke="none"/>
    <polygon points="300,144 300,156 312,150" fill="#111827" stroke="none"/>

    <!-- 원심 펌프 @ (90,150) -->
    <circle cx="90" cy="150" r="16"/>
    <line x1="90" y1="134" x2="108" y2="134"/>
    <line x1="108" y1="134" x2="108" y2="126"/>

    <!-- 열교환기 @ (200,150) -->
    <rect x="165" y="128" width="70" height="44"/>
    <path d="M165,150 Q182,128 200,150 T235,150"/>

    <!-- 냉각수 라인 (하부) -->
    <line x1="40" y1="235" x2="360" y2="235"/>
    <polygon points="90,229 90,241 102,235 " fill="#111827" stroke="none"/>
    <!-- 냉각수 → 열교환기 -->
    <line x1="200" y1="235" x2="200" y2="172"/>
    <line x1="220" y1="128" x2="220" y2="70"/>

    <!-- 컨트롤 밸브 @ (140,235) : 냉각수량 조절 -->
    <polygon points="128,225 128,245 140,235"/>
    <polygon points="152,225 152,245 140,235"/>
    <line x1="140" y1="235" x2="140" y2="212"/>
    <path d="M126,212 Q140,196 154,212 Z"/>

    <!-- 온도 계기(TIC) @ (300,80) + 신호 -->
    <circle cx="300" cy="80" r="20"/>
    <line x1="280" y1="80" x2="320" y2="80"/>
    <text x="300" y="76" font-size="11" fill="#111827" stroke="none" text-anchor="middle">TIC</text>
    <line x1="300" y1="100" x2="300" y2="150" stroke-dasharray="4 4" stroke-width="2"/>
    <line x1="140" y1="196" x2="140" y2="182" stroke-dasharray="4 4" stroke-width="2"/>
    <line x1="140" y1="182" x2="300" y2="182" stroke-dasharray="4 4" stroke-width="2"/>
    <line x1="300" y1="182" x2="300" y2="100" stroke-dasharray="4 4" stroke-width="2"/>
  </g>
</svg>
