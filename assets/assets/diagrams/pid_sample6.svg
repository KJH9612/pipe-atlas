<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect x="0" y="0" width="400" height="300" fill="#ffffff"/>
  <g fill="none" stroke="#111827" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- 흡입 -->
    <line x1="18" y1="120" x2="80" y2="120"/>
    <polygon points="44,114 44,126 56,120" fill="#111827" stroke="none"/>
    <text x="18" y="110" font-size="11" fill="#374151" stroke="none">공기 흡입</text>

    <!-- 흡입 필터 @ (96,120) -->
    <rect x="80" y="104" width="32" height="32"/>
    <line x1="84" y1="108" x2="108" y2="132" stroke-width="2"/>
    <line x1="94" y1="108" x2="108" y2="122" stroke-width="2"/>
    <line x1="84" y1="118" x2="98" y2="132" stroke-width="2"/>

    <!-- 압축기 @ (160,120) -->
    <circle cx="160" cy="120" r="20"/>
    <polygon points="150,106 172,114 172,126 150,134"/>
    <line x1="112" y1="120" x2="140" y2="120"/>

    <!-- 토출 -->
    <line x1="180" y1="120" x2="282" y2="120"/>
    <polygon points="248,114 248,126 260,120" fill="#111827" stroke="none"/>

    <!-- 체크 밸브 @ (225,120) -->
    <polygon points="217,112 217,128 232,120" fill="#111827"/>
    <line x1="235" y1="110" x2="235" y2="130"/>

    <!-- 리시버(용기) -->
    <rect x="282" y="72" width="40" height="148" rx="20"/>
    <line x1="282" y1="150" x2="322" y2="150"/>
    <text x="302" y="242" font-size="11" fill="#374151" stroke="none" text-anchor="middle">리시버</text>

    <!-- 안전 밸브(PSV) 상부 -->
    <line x1="302" y1="72" x2="302" y2="60"/>
    <polygon points="292,50 312,50 302,60"/>
    <polygon points="292,40 312,40 302,50"/>
    <polyline points="296,40 308,36 296,32 308,28"/>

    <!-- 저장 공기 토출 -->
    <line x1="322" y1="150" x2="360" y2="150"/>
    <polygon points="342,144 342,156 354,150" fill="#111827" stroke="none"/>
  </g>
</svg>
