<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect x="0" y="0" width="400" height="300" fill="#ffffff"/>
  <g fill="none" stroke="#111827" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- 열원(보일러/축열조) -->
    <rect x="18" y="108" width="52" height="62"/>
    <line x1="18" y1="122" x2="70" y2="122" stroke-dasharray="6 4" stroke-width="2"/>
    <text x="24" y="188" font-size="12" fill="#374151" stroke="none">열원</text>

    <!-- 공급관 -->
    <line x1="44" y1="108" x2="44" y2="68"/>
    <line x1="44" y1="68" x2="357" y2="68"/>
    <polygon points="150,62 150,74 162,68" fill="#111827" stroke="none"/>

    <!-- 순환 펌프 -->
    <circle cx="110" cy="68" r="14"/>
    <line x1="110" y1="54" x2="126" y2="54"/>
    <line x1="126" y1="54" x2="126" y2="47"/>

    <!-- 3방 혼합 밸브 -->
    <polygon points="188,58 188,78 200,68"/>
    <polygon points="212,58 212,78 200,68"/>
    <line x1="200" y1="68" x2="200" y2="210"/>
    <polygon points="192,88 208,88 200,76"/>

    <!-- 밸런싱 밸브 -->
    <polygon points="283,58 283,78 295,68"/>
    <polygon points="307,58 307,78 295,68"/>
    <line x1="295" y1="68" x2="295" y2="54"/>
    <circle cx="295" cy="47" r="8"/>
    <line x1="295" y1="47" x2="301" y2="42"/>

    <!-- 방열기 -->
    <rect x="338" y="54" width="38" height="28"/>
    <line x1="348" y1="54" x2="348" y2="82"/>
    <line x1="357" y1="54" x2="357" y2="82"/>
    <line x1="366" y1="54" x2="366" y2="82"/>

    <!-- 환수관 -->
    <line x1="357" y1="82" x2="357" y2="210"/>
    <line x1="357" y1="210" x2="44" y2="210"/>
    <line x1="44" y1="210" x2="44" y2="170"/>
    <polygon points="250,204 250,216 238,210" fill="#111827" stroke="none"/>

    <!-- 팽창 탱크 -->
    <line x1="90" y1="210" x2="90" y2="238"/>
    <rect x="74" y="238" width="34" height="34" rx="6"/>
    <line x1="74" y1="252" x2="108" y2="252" stroke-width="2"/>
  </g>
</svg>
