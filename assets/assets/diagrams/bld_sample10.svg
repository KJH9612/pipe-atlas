<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect x="0" y="0" width="400" height="300" fill="#ffffff"/>
  <g fill="none" stroke="#111827" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- 상수도 인입 -->
    <line x1="18" y1="120" x2="60" y2="120"/>
    <polygon points="34,114 34,126 46,120" fill="#111827" stroke="none"/>
    <text x="18" y="110" font-size="11" fill="#374151" stroke="none">상수도</text>

    <!-- 전동 밸브 -->
    <polygon points="63,110 63,130 75,120"/>
    <polygon points="87,110 87,130 75,120"/>
    <line x1="75" y1="120" x2="75" y2="104"/>
    <circle cx="75" cy="95" r="9"/>
    <text x="75" y="99" font-size="10" text-anchor="middle" fill="#111827" stroke="none">M</text>
    <line x1="87" y1="120" x2="150" y2="120"/>

    <!-- 저수조 -->
    <rect x="150" y="130" width="130" height="100"/>
    <line x1="150" y1="150" x2="280" y2="150" stroke-dasharray="6 4" stroke-width="2"/>
    <text x="200" y="252" font-size="12" fill="#374151" stroke="none" text-anchor="middle">저수조</text>

    <!-- 볼탭(플로트 밸브) -->
    <line x1="150" y1="120" x2="168" y2="120"/>
    <polygon points="168,112 168,128 184,120"/>
    <polygon points="206,112 206,128 184,120"/>
    <line x1="206" y1="120" x2="228" y2="134"/>
    <circle cx="236" cy="138" r="8"/>

    <!-- 급수 토출 -->
    <line x1="215" y1="230" x2="215" y2="255"/>
    <line x1="215" y1="255" x2="360" y2="255"/>
    <polygon points="330,249 330,261 342,255" fill="#111827" stroke="none"/>
  </g>
</svg>
