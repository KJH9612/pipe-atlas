    <ellipse cx="64" cy="52" rx="15" ry="8"/>
    <line x1="46" y1="26" x2="52" y2="40"/>
    <line x1="64" y1="67" x2="64" y2="255"/>

    <!-- 세면기 -->
    <path d="M150,34 L230,34 L222,54 Q190,62 158,54 Z"/>
