<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect x="0" y="0" width="400" height="300" fill="#ffffff"/>
  <g fill="none" stroke="#111827" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- 공정 라인 -->
    <line x1="30" y1="180" x2="370" y2="180"/>
    <!-- 유체 흐름 화살표 -->
    <polygon points="98,174 98,186 110,180" fill="#111827" stroke="none"/>
    <polygon points="190,174 190,186 202,180" fill="#111827" stroke="none"/>
    <polygon points="320,174 320,186 332,180" fill="#111827" stroke="none"/>

    <!-- 게이트 밸브 @ (60,180) -->
    <polygon points="48,170 48,190 60,180"/>
    <polygon points="72,170 72,190 60,180"/>
    <line x1="60" y1="180" x2="60" y2="162"/>
    <line x1="51" y1="162" x2="69" y2="162"/>

    <!-- 원심 펌프 @ (140,180) -->
    <circle cx="140" cy="180" r="16"/>
    <line x1="140" y1="164" x2="160" y2="164"/>
    <line x1="160" y1="164" x2="160" y2="156"/>

    <!-- 컨트롤 밸브 @ (250,180) -->
    <polygon points="238,170 238,190 250,180"/>
    <polygon points="262,170 262,190 250,180"/>
    <line x1="250" y1="180" x2="250" y2="150"/>
    <path d="M236,150 Q250,134 264,150 Z"/>

    <!-- 유량 계기(FIC) @ (250,90) + 제어 신호 -->
    <circle cx="250" cy="90" r="20"/>
    <line x1="230" y1="90" x2="270" y2="90"/>
    <text x="250" y="86" font-size="11" fill="#111827" stroke="none" text-anchor="middle">FIC</text>
    <line x1="250" y1="110" x2="250" y2="148" stroke-dasharray="4 4" stroke-width="2"/>
  </g>
</svg>
