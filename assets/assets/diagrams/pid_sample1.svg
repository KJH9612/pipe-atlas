<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect x="0" y="0" width="400" height="300" fill="#ffffff"/>
  <g fill="none" stroke="#111827" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- 공정 라인 -->
    <line x1="20" y1="180" x2="380" y2="180"/>

    <!-- ① 용기(탱크) @x=70 -->
    <rect x="50" y="120" width="40" height="90" rx="20"/>
    <line x1="70" y1="210" x2="70" y2="180"/>

    <!-- ② 원심 펌프 @x=170 -->
    <circle cx="170" cy="180" r="22"/>
    <line x1="170" y1="158" x2="192" y2="158"/>
    <line x1="192" y1="158" x2="192" y2="146"/>

    <!-- ③ 컨트롤 밸브 @x=270 -->
    <polygon points="254,168 254,192 270,180"/>
    <polygon points="286,168 286,192 270,180"/>
    <line x1="270" y1="180" x2="270" y2="150"/>
    <path d="M256,150 Q270,134 284,150 Z"/>

    <!-- ④ 계기(instrument) @x=270 위 -->
    <circle cx="270" cy="110" r="20"/>
    <line x1="250" y1="110" x2="290" y2="110"/>
    <line x1="270" y1="130" x2="270" y2="150" stroke-dasharray="4 4" stroke-width="2"/>
  </g>
</svg>
