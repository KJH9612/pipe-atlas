<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect x="0" y="0" width="400" height="300" fill="#ffffff"/>
  <g fill="none" stroke="#111827" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- 본관 -->
    <line x1="30" y1="160" x2="370" y2="160"/>
    <text x="30" y="150" font-size="12" fill="#374151" stroke="none">1차(고압)</text>
    <text x="300" y="150" font-size="12" fill="#374151" stroke="none">2차(저압)</text>
    <!-- 유체 흐름 화살표 (1차 → 2차, 오른쪽으로) -->
    <polygon points="90,154 90,166 102,160" fill="#111827" stroke="none"/>
    <polygon points="246,154 246,166 258,160" fill="#111827" stroke="none"/>

    <!-- 게이트 밸브 @ (60,160) -->
    <polygon points="48,150 48,170 60,160"/>
    <polygon points="72,150 72,170 60,160"/>

    <!-- 스트레이너 @ (114,168) -->
    <line x1="110" y1="160" x2="130" y2="186"/>
    <line x1="104" y1="164" x2="120" y2="184" stroke-width="2"/>
    <line x1="110" y1="160" x2="126" y2="180" stroke-width="2"/>

    <!-- 1차 압력계 @ (150,110) -->
    <line x1="150" y1="160" x2="150" y2="124"/>
    <circle cx="150" cy="110" r="14"/>
    <line x1="150" y1="110" x2="160" y2="102"/>

    <!-- 감압 밸브 @ (215,160) -->
    <polygon points="201,150 201,170 215,160"/>
    <polygon points="229,150 229,170 215,160"/>
    <line x1="215" y1="160" x2="215" y2="144"/>
    <rect x="203" y="136" width="24" height="8"/>

    <!-- 2차 압력계 @ (270,110) -->
    <line x1="270" y1="160" x2="270" y2="124"/>
    <circle cx="270" cy="110" r="14"/>
    <line x1="270" y1="110" x2="280" y2="102"/>

    <!-- 안전 밸브 @ (325,160) -->
    <polygon points="313,150 313,170 325,160"/>
    <polygon points="337,150 337,170 325,160"/>
    <line x1="325" y1="160" x2="325" y2="146"/>
    <polyline points="317,146 333,141 317,136 333,131 317,126"/>
  </g>
</svg>
