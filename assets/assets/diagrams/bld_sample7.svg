<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect x="0" y="0" width="400" height="300" fill="#ffffff"/>
  <g fill="none" stroke="#111827" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- 지하 저수조 -->
    <rect x="20" y="192" width="58" height="48"/>
    <line x1="20" y1="206" x2="78" y2="206" stroke-dasharray="6 4" stroke-width="2"/>
    <text x="24" y="258" font-size="12" fill="#374151" stroke="none">저수조</text>

    <!-- 서비스관 -->
    <line x1="78" y1="216" x2="250" y2="216"/>
    <polygon points="132,210 132,222 144,216" fill="#111827" stroke="none"/>

    <!-- 풋 밸브 @ (100,216) -->
    <polygon points="92,209 92,223 106,216" fill="#111827"/>
    <path d="M108,208 a8,8 0 0 1 0,16"/>

    <!-- 펌프 @ (162,216) -->
    <circle cx="162" cy="216" r="15"/>
    <line x1="162" y1="201" x2="178" y2="201"/>
    <line x1="178" y1="201" x2="178" y2="193"/>

    <!-- 체크 밸브 @ (215,216) -->
    <polygon points="207,208 207,224 222,216" fill="#111827"/>
    <line x1="225" y1="206" x2="225" y2="226"/>

    <!-- 입상관 -->
    <line x1="250" y1="216" x2="250" y2="66"/>
    <polygon points="244,150 256,150 250,138" fill="#111827" stroke="none"/>

    <!-- 옥상 고가수조 -->
    <rect x="250" y="44" width="86" height="42"/>
    <line x1="250" y1="58" x2="336" y2="58" stroke-dasharray="6 4" stroke-width="2"/>
    <text x="262" y="36" font-size="12" fill="#374151" stroke="none">고가수조</text>

    <!-- 중력 급수 -->
    <line x1="320" y1="86" x2="320" y2="130"/>
    <line x1="320" y1="130" x2="372" y2="130"/>
    <polygon points="320,110 314,98 326,98" fill="#111827" stroke="none"/>
    <text x="332" y="122" font-size="11" fill="#374151" stroke="none">급수</text>
  </g>
</svg>
