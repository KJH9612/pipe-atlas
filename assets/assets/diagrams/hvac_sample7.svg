<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect x="0" y="0" width="400" height="300" fill="#ffffff"/>
  <g fill="none" stroke="#111827" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- 급수 + 입상관 -->
    <line x1="18" y1="235" x2="130" y2="235"/>
    <line x1="130" y1="235" x2="130" y2="80"/>
    <line x1="130" y1="80" x2="360" y2="80"/>
    <polygon points="124,165 136,165 130,153" fill="#111827" stroke="none"/>

    <!-- OS&Y 밸브 -->
    <polygon points="40,227 40,243 52,235"/>
    <polygon points="64,227 64,243 52,235"/>
    <line x1="52" y1="235" x2="52" y2="214"/>
    <line x1="44" y1="214" x2="60" y2="214"/>
    <line x1="47" y1="227" x2="57" y2="227"/>

