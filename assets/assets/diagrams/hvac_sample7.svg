    <!-- 스프링클러 헤드(폐쇄형) -->
    <line x1="200" y1="80" x2="200" y2="96"/>
    <circle cx="200" cy="102" r="8" fill="#111827"/>
    <line x1="190" y1="116" x2="210" y2="116"/>
    <line x1="310" y1="80" x2="310" y2="96"/>
    <circle cx="310" cy="102" r="8" fill="#111827"/>
