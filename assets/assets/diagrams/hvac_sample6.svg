<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect x="0" y="0" width="400" height="300" fill="#ffffff"/>
  <g fill="none" stroke="#111827" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- 화재 감지기 (천장) -->
    <circle cx="100" cy="50" r="14"/>
    <circle cx="100" cy="50" r="5" fill="#111827"/>
    <line x1="100" y1="28" x2="100" y2="34"/>
    <line x1="78" y1="50" x2="84" y2="50"/>
    <line x1="116" y1="50" x2="122" y2="50"/>
    <text x="100" y="82" font-size="11" fill="#374151" stroke="none" text-anchor="middle">감지기</text>

    <!-- 스프링클러 소화 배관 -->
    <line x1="70" y1="190" x2="70" y2="60"/>
    <line x1="70" y1="60" x2="240" y2="60"/>
    <polygon points="64,140 76,140 70,128" fill="#111827" stroke="none"/>

    <!-- 알람 밸브 -->
    <polygon points="58,153 82,153 70,165"/>
    <polygon points="58,177 82,177 70,165"/>
    <path d="M82,158 a8,8 0 0 1 16,0 Z"/>
    <line x1="70" y1="190" x2="70" y2="210"/>
    <line x1="50" y1="210" x2="90" y2="210"/>

    <!-- 스프링클러 헤드 -->
    <line x1="220" y1="60" x2="220" y2="76"/>
    <circle cx="220" cy="82" r="8" fill="#111827"/>
    <line x1="210" y1="96" x2="230" y2="96"/>

    <!-- 옥내 소화전 -->
    <rect x="230" y="176" width="48" height="58"/>
    <circle cx="248" cy="205" r="10"/>
    <line x1="262" y1="188" x2="262" y2="222"/>
    <line x1="256" y1="188" x2="270" y2="188"/>
    <text x="254" y="250" font-size="11" fill="#374151" stroke="none" text-anchor="middle">소화전</text>

    <!-- 소화기 -->
    <rect x="320" y="192" width="20" height="32" rx="7"/>
    <rect x="324" y="182" width="12" height="10"/>
    <line x1="336" y1="184" x2="348" y2="180"/>
    <line x1="320" y1="204" x2="340" y2="204"/>
