<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect x="0" y="0" width="400" height="300" fill="#ffffff"/>
  <g fill="none" stroke="#111827" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- 온수 탱크 -->
    <rect x="44" y="86" width="64" height="120" rx="8"/>
    <text x="52" y="152" font-size="13" fill="#374151" stroke="none">온수</text>
    <text x="52" y="170" font-size="13" fill="#374151" stroke="none">탱크</text>

    <!-- 안전 밸브 @ (76,62) -->
    <line x1="76" y1="86" x2="76" y2="74"/>
    <polygon points="66,66 66,84 76,74"/>
    <polygon points="86,66 86,84 76,74"/>
    <polyline points="70,66 82,62 70,58 82,54 70,50"/>

    <!-- 급탕 출탕관 -->
    <line x1="108" y1="110" x2="360" y2="110"/>
    <text x="300" y="100" font-size="13" fill="#374151" stroke="none">급탕</text>

    <!-- 온도계 @ (140,130) -->
    <line x1="140" y1="110" x2="140" y2="120"/>
    <rect x="136" y="120" width="8" height="20" rx="4"/>
    <circle cx="140" cy="146" r="7" fill="#111827"/>

    <!-- 환탕(순환) 관 -->
    <line x1="360" y1="250" x2="76" y2="250"/>
    <line x1="76" y1="250" x2="76" y2="206"/>
    <line x1="360" y1="110" x2="360" y2="250"/>
    <!-- 유체 흐름 화살표 (급탕: 오른쪽, 환탕: 왼쪽으로 탱크 복귀) -->
    <polygon points="248,104 248,116 260,110" fill="#111827" stroke="none"/>
    <polygon points="312,244 312,256 300,250" fill="#111827" stroke="none"/>

    <!-- 게이트 밸브 @ (160,250) -->
    <polygon points="150,242 150,258 160,250"/>
    <polygon points="170,242 170,258 160,250"/>

    <!-- 순환 펌프 @ (220,250) -->
    <circle cx="220" cy="250" r="14"/>
    <line x1="220" y1="236" x2="210" y2="228"/>
    <line x1="220" y1="236" x2="230" y2="228"/>
  </g>
</svg>
