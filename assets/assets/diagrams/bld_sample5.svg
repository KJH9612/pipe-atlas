<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect x="0" y="0" width="400" height="300" fill="#ffffff"/>
  <g fill="none" stroke="#111827" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- 배관 본관 -->
    <line x1="30" y1="150" x2="370" y2="150"/>
    <!-- 유체 흐름 화살표 (본관: 오른쪽, 분기: 위로) -->
    <polygon points="106,144 106,156 118,150" fill="#111827" stroke="none"/>
    <polygon points="288,144 288,156 300,150" fill="#111827" stroke="none"/>
    <polygon points="189,118 201,118 195,106" fill="#111827" stroke="none"/>

    <!-- 게이트 밸브 @ (80,150) -->
    <polygon points="68,140 68,160 80,150"/>
    <polygon points="92,140 92,160 80,150"/>

    <!-- 플랜지 @ (135,150) -->
    <line x1="131" y1="132" x2="131" y2="168"/>
    <line x1="139" y1="132" x2="139" y2="168"/>

    <!-- 티 @ (195,150) + 상향 분기 -->
    <circle cx="195" cy="150" r="3.5" fill="#111827"/>
    <line x1="195" y1="150" x2="195" y2="80"/>

    <!-- 90° 엘보 @ (195,80) -->
    <line x1="195" y1="80" x2="255" y2="80"/>
    <circle cx="195" cy="80" r="3.5" fill="#111827"/>
    <circle cx="255" cy="80" r="3.5" fill="#111827"/>

    <!-- 리듀서 @ (255,150) -->
    <polygon points="243,140 243,160 267,146 267,154"/>

    <!-- 유니언 @ (320,150) -->
    <line x1="311" y1="136" x2="311" y2="164"/>
    <line x1="329" y1="136" x2="329" y2="164"/>
    <line x1="320" y1="140" x2="320" y2="160"/>
  </g>
</svg>
