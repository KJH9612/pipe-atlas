    <!-- 공정 라인 -->
    <line x1="30" y1="180" x2="370" y2="180"/>
    <polygon points="104,174 104,186 116,180" fill="#111827" stroke="none"/>
    <polygon points="330,174 330,186 342,180" fill="#111827" stroke="none"/>

    <!-- 펌프 -->
    <circle cx="75" cy="180" r="14"/>
    <line x1="75" y1="166" x2="91" y2="166"/>
    <line x1="91" y1="166" x2="91" y2="159"/>

    <!-- 3방 밸브 (열교환기/바이패스 분배) -->
    <polygon points="148,170 148,190 160,180"/>
    <polygon points="172,170 172,190 160,180"/>
    <line x1="160" y1="180" x2="160" y2="110"/>
    <polygon points="150,168 170,168 160,156"/>

    <!-- 열교환기 경로 -->
    <line x1="160" y1="110" x2="240" y2="110"/>
    <rect x="240" y="92" width="60" height="36"/>
