    <polygon points="194,104 194,116 206,110" fill="#111827" stroke="none"/>

    <!-- 온도 계기(TIC) + 제어 신호 -->
    <circle cx="335" cy="88" r="18"/>
    <line x1="317" y1="88" x2="353" y2="88"/>
    <text x="335" y="84" font-size="11" fill="#111827" stroke="none" text-anchor="middle">TIC</text>
    <line x1="335" y1="106" x2="335" y2="240" stroke-dasharray="4 4" stroke-width="2"/>
    <line x1="335" y1="240" x2="160" y2="240" stroke-dasharray="4 4" stroke-width="2"/>
    <line x1="160" y1="240" x2="160" y2="192" stroke-dasharray="4 4" stroke-width="2"/>
